<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Is Lola Lost… & Found?</title>
    <style>
        /* Importing the girly handwritten print font */
        @import url('https://fonts.googleapis.com/css2?family=Mali:wght@600;700&display=swap');

        body { 
            font-family: 'Mali', 'Chalkboard SE', 'Comic Sans MS', sans-serif; 
            font-weight: 600; 
            text-align: center; 
            margin: 0;
            padding: 40px 20px 20px 20px; 
            
            /* Background Image Setup */
            background-image: url('lola-bg.jpeg'); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            
            /* Text Settings */
            color: #ffffff; 
            text-shadow: 2px 2px 8px rgba(0,0,0,0.9); 
            
            /* Layout */
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-height: 90vh;
            box-sizing: border-box;
        }
        
        /* Sky Section */
        .top-section {
            margin-top: 5vh; 
        }
        
        h1 { 
            font-size: 40px; 
            font-weight: 700; 
            color: #FFB6C1; 
            -webkit-text-stroke: 1.5px #000000; 
            text-shadow: 4px 4px 10px rgba(0,0,0,0.9); 
            margin-bottom: 5px; 
            line-height: 1.2;
        }

        /* Ground Section - Spacing compressed to push everything down */
        .bottom-section {
            margin-bottom: 2vh; 
            padding: 0 10px;
        }
        
        .btn-call { 
            display: inline-block; 
            width: 100%; 
            max-width: 320px; 
            margin: 0 auto 15px auto; /* Drastically reduced bottom margin to drop the button */
            padding: 16px; 
            font-size: 22px; 
            font-weight: 700; 
            color: white
